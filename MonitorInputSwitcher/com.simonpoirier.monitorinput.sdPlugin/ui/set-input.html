<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Set Monitor Input</title>
  <link rel="stylesheet" href="common.css">
</head>
<body>
  <div class="field">
    <label for="monitorIndex">Monitor</label>
    <div class="row">
      <select id="monitorIndex"><option value="0">Loading…</option></select>
      <button id="refresh" title="Refresh monitor list">⟳</button>
    </div>
  </div>

  <div class="field">
    <label for="inputSource">Input Source</label>
    <select id="inputSource">
      <option value="0x01">VGA 1 (0x01)</option>
      <option value="0x02">VGA 2 (0x02)</option>
      <option value="0x03">DVI 1 (0x03)</option>
      <option value="0x04">DVI 2 (0x04)</option>
      <option value="0x0F">DisplayPort 1 (0x0F)</option>
      <option value="0x10">DisplayPort 2 (0x10)</option>
      <option value="0x11">HDMI 1 (0x11)</option>
      <option value="0x12">HDMI 2 (0x12)</option>
      <option value="0x1B">USB-C (0x1B)</option>
      <option value="custom">Custom…</option>
    </select>
  </div>

  <div class="field" id="customField" style="display:none;">
    <label for="customInput">Custom VCP Value (hex)</label>
    <input id="customInput" type="text" value="0x11" placeholder="0x11">
  </div>

  <div class="hint">
    DDC/CI must be enabled in your monitor's OSD settings.<br>
    VCP code 0x60 is used to switch the input source.
  </div>

  <script src="common.js"></script>
  <script src="set-input.js"></script>
</body>
</html>
